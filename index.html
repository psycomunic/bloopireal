    <script>
      // Script para substituir o nome Bluen por Bloopi dinamicamente
      document.addEventListener("DOMContentLoaded", () => {
        function replaceText(node) {
          if (node.nodeType === Node.TEXT_NODE) {
            if (node.parentElement && node.parentElement.tagName !== 'SCRIPT' && node.parentElement.tagName !== 'STYLE') {
              if (node.nodeValue.includes('Bluen')) {
                node.nodeValue = node.nodeValue.replace(/Bluen/g, 'Bloopi');
              }
              if (node.nodeValue.includes('bluen')) {
                node.nodeValue = node.nodeValue.replace(/bluen/g, 'bloopi');
              }
            }
          } else if (node.nodeType === Node.ELEMENT_NODE) {
            for (let child of node.childNodes) {
              replaceText(child);
            }
          }
        }

        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === 'childList') {
              mutation.addedNodes.forEach((node) => {
                replaceText(node);
              });
            }
          });
        });
        
        observer.observe(document.body, { childList: true, subtree: true });
        replaceText(document.body);

        // Observer para corrigir o title da aba (que é injetado dinamicamente pelo JS)
        const titleObserver = new MutationObserver(() => {
          if (document.title.includes('Bluen')) {
            document.title = document.title.replace(/Bluen/g, 'Bloopi');
          }
          if (document.title.includes('bluen')) {
            document.title = document.title.replace(/bluen/g, 'bloopi');
          }
        });
        const headNode = document.querySelector('head');
        if (headNode) {
          titleObserver.observe(headNode, { childList: true, subtree: true, characterData: true });
        }
      });
    </script>
